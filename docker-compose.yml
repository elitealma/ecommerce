version: "3.8"

services:
  elite-dashboard:
    image: nginx:alpine
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.elite-dashboard.rule=Host(`ecommerce.pegasus360agency.com`)"
        - "traefik.http.routers.elite-dashboard.entrypoints=websecure"
        - "traefik.http.routers.elite-dashboard.tls.certresolver=letsencrypt"
        - "traefik.http.services.elite-dashboard.loadbalancer.server.port=80"
    networks:
      - pegasus

networks:
  pegasus:
    external: true
    name: pegasus_net
