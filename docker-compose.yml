version: "3.8"

services:
  elite-dashboard:
    image: nginx:alpine
    container_name: elite-dashboard
    restart: unless-stopped
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.elite-dashboard.rule=Host(`ecomerce.pegasus360agency.com`)"
      - "traefik.http.routers.elite-dashboard.entrypoints=websecure"
      - "traefik.http.routers.elite-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.elite-dashboard.loadbalancer.server.port=80"
    networks:
      - proxy

networks:
  proxy:
    external: true
